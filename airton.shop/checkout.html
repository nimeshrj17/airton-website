<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Airton Shop (Local)</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f5f5f5; margin: 0; }
        .container { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        a { color: #007bff; text-decoration: none; display: inline-block; margin-top: 20px; }
        .cart-items { margin-top: 20px; text-align: left; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Local Checkout</h2>
        <p>This is a custom local checkout page.</p>
        <div class="cart-items" id="cartItems">
            <p>Loading cart data...</p>
        </div>
        <a href="index.html">← Back to Home</a>
    </div>
    
    <script>
        // Fetch cart items from the backend
        async function loadCart() {
            try {
                const response = await fetch('http://localhost:4000/api/cart/get', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'token': localStorage.getItem('token') || ''
                    },
                    body: JSON.stringify({}) // Backend expects userId or extracts from token
                });
                const data = await response.json();
                const cartContainer = document.getElementById('cartItems');
                
                if (data.success) {
                    cartContainer.innerHTML = `<pre>${JSON.stringify(data.cartData, null, 2)}</pre>`;
                } else {
                    cartContainer.innerHTML = `<p>Error: ${data.message}</p>`;
                }
            } catch (err) {
                document.getElementById('cartItems').innerHTML = '<p>Failed to connect to backend.</p>';
            }
        }
        
        document.addEventListener('DOMContentLoaded', loadCart);
    </script>
<script src="/airton.shop/custom-api.js"></script>
</body>
</html>
