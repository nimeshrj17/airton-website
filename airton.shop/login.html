<!DOCTYPE html><html lang="fr"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Se connecter - Airton</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: white; 
            margin: 0; 
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        
        .header {
            margin-top: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo {
            height: 36px;
            margin-bottom: 12px;
        }

        .badge-clients {
            background-color: black;
            color: white;
            font-size: 18px;
            padding: 4px 12px;
            font-weight: 400;
            display: inline-block;
            margin-bottom: 10px;
        }

        .badge-clients strong {
            font-weight: 700;
        }

        .trustpilot-box {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 15px;
            color: #000;
        }

        .trustpilot-box img {
            height: 20px;
        }
        
        .trustpilot-text {
            font-weight: bold;
            font-size: 15px;
        }

        .trustpilot-avis {
            color: #333;
            font-size: 14px;
        }

        .login-container {
            width: 100%;
            max-width: 440px;
            margin-top: 100px;
            padding: 0 20px;
            box-sizing: border-box;
            text-align: left;
        }

        .title {
            font-size: 22px;
            font-weight: 700;
            margin: 0 0 6px 0;
            color: #000;
        }

        .subtitle {
            font-size: 14px;
            color: #666;
            margin: 0 0 24px 0;
        }

        .btn-shop {
            background-color: #5a31f4;
            color: white;
            border: none;
            border-radius: 6px;
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            box-sizing: border-box;
        }

        .btn-shop:hover {
            background-color: #4a28cc;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 24px 0;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e0e0e0;
        }

        .divider span {
            padding: 0 10px;
            color: #777;
            font-size: 13px;
        }

        .input-group {
            position: relative;
            margin-bottom: 16px;
        }

        .input-group input {
            width: 100%;
            padding: 16px 45px 16px 16px;
            border: 2px solid #0056b3;
            border-radius: 8px;
            font-size: 15px;
            box-sizing: border-box;
            outline: none;
            color: #000;
        }
        
        .input-group input::placeholder {
            color: #777;
        }

        .input-group button {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
            cursor: pointer;
        }

        .checkbox-group input {
            margin: 0 10px 0 0;
            width: 18px;
            height: 18px;
            accent-color: #0056b3;
            cursor: pointer;
        }

        .checkbox-group label {
            font-size: 13px;
            color: #000;
            cursor: pointer;
            font-weight: 600;
        }

        .footer-text {
            font-size: 11px;
            color: #777;
            text-align: center;
        }

        .footer-text a {
            color: #777;
            text-decoration: underline;
        }

        .continue-btn {
            width: 100%;
            background-color: #016FD0;
            color: #fff;
            border: none;
            border-radius: 4px;
            padding: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }
        .continue-btn:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
            opacity: 0.7;
        }
    </style>

<script async src="https://www.googletagmanager.com/gtag/js?id=AW-18305127945"></script>

</head>
<body>

    <div class="header">
        <img src="../cdn.shopify.com/s/files/1/2600/0244/files/LOGO_OFF%EF%B9%96v=1737552371.png" alt="Airton" class="logo">
        <div class="badge-clients">Plus de <strong>130 000</strong> clients</div>
        <div class="trustpilot-box">
            <span style="color: #00b67a; font-size: 20px; line-height: 1;">★</span>
            <span class="trustpilot-text">Trustpilot</span>
            <svg viewBox="0 0 100 20" width="100" height="20" xmlns="http://www.w3.org/2000/svg">
                <rect width="18" height="18" x="1" y="1" fill="#00b67a"></rect>
                <path fill="#fff" d="M10 3l2 5.5h5.5l-4.5 3.5 1.5 5.5-5-3.5-5 3.5 1.5-5.5-4.5-3.5h5.5z"></path>
                <rect width="18" height="18" x="21" y="1" fill="#00b67a"></rect>
                <path fill="#fff" d="M30 3l2 5.5h5.5l-4.5 3.5 1.5 5.5-5-3.5-5 3.5 1.5-5.5-4.5-3.5h5.5z"></path>
                <rect width="18" height="18" x="41" y="1" fill="#00b67a"></rect>
                <path fill="#fff" d="M50 3l2 5.5h5.5l-4.5 3.5 1.5 5.5-5-3.5-5 3.5 1.5-5.5-4.5-3.5h5.5z"></path>
                <rect width="18" height="18" x="61" y="1" fill="#00b67a"></rect>
                <path fill="#fff" d="M70 3l2 5.5h5.5l-4.5 3.5 1.5 5.5-5-3.5-5 3.5 1.5-5.5-4.5-3.5h5.5z"></path>
                <rect width="18" height="18" x="81" y="1" fill="#00b67a"></rect>
                <path fill="#fff" d="M90 3l2 5.5h5.5l-4.5 3.5 1.5 5.5-5-3.5-5 3.5 1.5-5.5-4.5-3.5h5.5z"></path>
            </svg>
            <span class="trustpilot-avis">13 800 avis</span>
        </div>
    </div>

    <div class="login-container">
        <h1 class="title">Se connecter</h1>
        <p class="subtitle">Se connecter ou créer un compte</p>


        <form id="loginForm">
            <div class="input-group">
                <input type="email" id="email" placeholder="Adresse e-mail" required="">
            </div>
            
            <button type="submit" id="continueBtn" class="continue-btn" disabled>Continuer</button>

            <label class="checkbox-group">
                <input type="checkbox" checked="">
                <span>Envoyez-moi des nouvelles et des offres par e-mail</span>
            </label>
        </form>

        <p class="footer-text">
            En continuant, vous acceptez nos <a href="#">Conditions d'utilisation</a>
        </p>
    </div>
    
    <div class="dashboard-container" id="dashboard-container" style="display: none; max-width: 800px; margin: 40px auto; padding: 20px;">
        <h1 class="title">Mes Commandes</h1>
        <button onclick="logout()" class="continue-btn" style="width: auto; padding: 8px 16px; margin-bottom: 30px; background-color: #f0f0f0; color: #333;">Se déconnecter</button>
        <div id="orders-list">
            <p>Chargement des commandes...</p>
        </div>
    </div>

    <script>
        const emailInput = document.getElementById('email');
        const continueBtn = document.getElementById('continueBtn');
        
        emailInput.addEventListener('input', () => {
            if (emailInput.checkValidity() && emailInput.value.trim() !== '') {
                continueBtn.disabled = false;
            } else {
                continueBtn.disabled = true;
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            localStorage.setItem('user_logged_in', 'true');
            localStorage.setItem('user_email', email);
            
            const urlParams = new URLSearchParams(window.location.search);
            const redirect = urlParams.get('redirect');
            if (redirect) {
                window.location.href = redirect;
            } else {
                document.querySelector('.login-container').style.display = 'none';
                document.getElementById('dashboard-container').style.display = 'block';
                loadUserOrders(email);
            }
        });
        
        function logout() {
            localStorage.removeItem('user_logged_in');
            localStorage.removeItem('user_email');
            window.location.reload();
        }

        async function loadUserOrders(email) {
            const list = document.getElementById('orders-list');
            list.innerHTML = '<p>Chargement des commandes...</p>';
            try {
                const res = await fetch('/api/orders?email=' + encodeURIComponent(email));
                const data = await res.json();
                
                if (!res.ok) throw new Error(data.error);
                
                if (data.length === 0) {
                    list.innerHTML = '<p>Aucune commande trouvée pour cette adresse e-mail.</p>';
                    return;
                }
                
                let html = '';
                data.forEach(order => {
                    const statusStr = order.status === 'pending' ? 'En cours' : (order.status === 'confirmed' ? 'Confirmée' : order.status);
                    const dateStr = new Date(order.created_at).toLocaleDateString('fr-FR');
                    
                    html += `
                        <div style="border: 1px solid #eaeaea; border-radius: 8px; padding: 20px; margin-bottom: 20px; background: #fff;">
                            <div style="display: flex; justify-content: space-between; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px;">
                                <div><strong>Commande #${order.id}</strong><br><span style="color:#777; font-size:13px;">${dateStr}</span></div>
                                <div style="text-align: right;"><strong>${(order.total_amount || 0).toFixed(2)} €</strong><br><span style="color:#016FD0; font-size:13px;">${statusStr}</span></div>
                            </div>
                            <div style="margin-bottom: 15px;">
                                ${(order.items || []).map(item => `
                                    <div style="display: flex; align-items: center; margin-bottom: 10px;">
                                        ${(item.image_url || item.image) ? `<img src="${item.image_url || item.image}" width="40" height="40" style="object-fit:cover; border-radius:4px; margin-right:15px;">` : `<div style="width:40px; height:40px; background:#eee; margin-right:15px; border-radius:4px;"></div>`}
                                        <span style="font-size: 14px;">${item.quantity}x ${item.name || item.title}</span>
                                    </div>
                                `).join('')}
                            </div>
                            <div>
                                <a href="mailto:service-client@airton-shop.eu?subject=Problème avec la commande ${order.id}" style="display: inline-block; padding: 8px 16px; background-color: #fff; border: 1px solid #d0021b; color: #d0021b; border-radius: 4px; font-weight: 600; text-decoration: none; font-size: 13px;">Signaler un problème</a>
                            </div>
                        </div>
                    `;
                });
                
                list.innerHTML = html;
            } catch(e) {
                list.innerHTML = `<p style="color:red;">Erreur lors du chargement des commandes : ${e.message}</p>`;
            }
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            const savedEmail = localStorage.getItem('user_email');
            const urlParams = new URLSearchParams(window.location.search);
            const redirect = urlParams.get('redirect');
            
            if (savedEmail && !redirect) {
                document.querySelector('.login-container').style.display = 'none';
                document.getElementById('dashboard-container').style.display = 'block';
                loadUserOrders(savedEmail);
            }
        });
    </script>
    <script src="custom-api.js"></script>



<script src="/js/cart.js"></script>
</body></html>
