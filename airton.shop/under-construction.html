<!DOCTYPE html><html lang="en"><head>

<script>
window.unlockSite = function() {
    if (document.getElementById('passcode').value === 'airton2026') {
        sessionStorage.setItem('client_unlocked', 'true');
        location.reload();
    } else {
        document.getElementById('error-msg').style.display = 'block';
    }
};
if (sessionStorage.getItem('client_unlocked') !== 'true') {
    document.documentElement.innerHTML = `
        <head>
            <meta name="viewport" content="width=device-width, initial-scale=1.0">

            <style>
                body { margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #f8f9fa; font-family: 'Helvetica Neue', Arial, sans-serif; text-align: center; }
                .lock-container { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-width: 400px; width: 90%; }
                h2 { color: #333; font-size: 20px; margin-bottom: 15px; line-height: 1.4; }
                p { color: #666; font-size: 14px; margin-bottom: 25px; }
                input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; box-sizing: border-box; }
                button { width: 100%; padding: 12px; background: #0A70D6; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
                button:hover { background: #085cb0; }
                .error { color: #d32f2f; font-size: 14px; margin-top: 10px; display: none; }
            </style>
        </head>
        <body>
            <div class="lock-container">
                <h2>Project Handover in Progress</h2>
                <p>This website is currently unavailable while final project handover is being completed.</p>
                <input type="password" id="passcode" placeholder="Enter Passcode" onkeypress="if(event.key === 'Enter') window.unlockSite()">
                <button onclick="window.unlockSite()">Access Website</button>
                <div id="error-msg" class="error">Incorrect passcode. Please try again.</div>
            </div>
        </body>
    `;
    window.stop();
}
</script>
